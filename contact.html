<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Study Notes</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="grain"></div>

  <header class="site-header">
    <nav class="nav">
      <a href="index.html" class="nav-logo">Notes<span class="accent">.</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <div class="hero-label">Contact</div>
      <h1 class="hero-title">Say<br /><em>hello.</em></h1>
    </section>

    <div class="page-body">
      <p>Have a question about the notes, spotted an error, or just want to connect?</p>

      <!-- 
        For a static site, you can use a form service like Formspree.
        Replace the action URL with your own Formspree endpoint:
        <form action="https://formspree.io/f/YOUR_ID" method="POST">
      -->
      <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="What's on your mind?" required></textarea>
        </div>
        <button type="submit" class="btn">Send message →</button>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-logo">Notes<span class="accent">.</span></span>
      <span class="footer-copy">Built & maintained by Fi</span>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
