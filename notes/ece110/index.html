<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECE 110 — Study Notes</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="grain"></div>

  <header class="site-header">
    <nav class="nav">
      <a href="../../index.html" class="nav-logo">Notes<span class="accent">.</span></a>
      <ul class="nav-links">
        <li><a href="../../index.html">Home</a></li>
        <li><a href="../../about.html">About</a></li>
        <li><a href="../../contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="notes-hero">
      <a href="../../index.html" class="back-link">← All Courses</a>
      <div class="hero-label">ECE 110</div>
      <h1 class="hero-title" style="font-family: var(--ff-display); font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 400;">
        Introduction to Electronics
      </h1>
    </section>

    <div class="notes-layout">

      <!-- Sidebar -->
      <aside class="notes-sidebar">
        <div class="sidebar-title">Contents</div>
        <nav class="sidebar-nav">
          <a href="#thevenin" class="active">Thévenin / Norton</a>
          <a href="#nodal">Nodal Analysis</a>
        </nav>
      </aside>

      <!-- Main content -->
      <article class="notes-content" id="md-content">
        <p style="color: var(--text-dim)">Loading...</p>
      </article>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-logo">Notes<span class="accent">.</span></span>
      <span class="footer-copy">Built & maintained by FP</span>
    </div>
  </footer>

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- LaTeX rendering -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$']],
        displayMath: [['$$', '$$']],
      },
      startup: { typeset: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <!-- Your script (keep this) -->
  <script src="../../js/script.js"></script>

  <!-- Markdown loader -->
  <script>
    const files = [
      '../../notes/ece110/thevenin.md',
      '../../notes/ece110/nodal.md',
      // '../../notes/ece110/mosfets.md', // Uncomment/add more as needed
    ];

    // Map file names to section ids
    const fileToId = {
      '../../notes/ece110/thevenin.md': 'thevenin',
      '../../notes/ece110/nodal.md': 'nodal',
      // '../../notes/ece110/mosfets.md': 'mosfets',
    };

    async function loadNotes() {
      const container = document.getElementById('md-content');
      const sidebarNav = document.querySelector('.sidebar-nav');
      container.innerHTML = '';
      sidebarNav.innerHTML = ''; // Clear existing links

      for (const file of files) {
        const res = await fetch(file);
        if (!res.ok) continue;
        const text = await res.text();

        const section = document.createElement('div');
        section.classList.add('md-section');
        // Assign id based on file name
        const sectionId = fileToId[file] || '';
        if (sectionId) section.id = sectionId;
        section.innerHTML = marked.parse(text);
        container.appendChild(section);

        // Add H1 link to sidebar
        const h1Element = section.querySelector('h1');
        if (h1Element) {
          const h1Link = document.createElement('a');
          h1Link.href = `#${sectionId}`;
          h1Link.textContent = h1Element.textContent;
          sidebarNav.appendChild(h1Link);
        }

        // Add H2 links to sidebar
        const h2Elements = section.querySelectorAll('h2');
        h2Elements.forEach((h2, index) => {
          // Generate ID for H2 if it doesn't have one
          if (!h2.id) {
            const baseId = h2.textContent.toLowerCase()
              .replace(/[^a-z0-9\s-]/g, '') // Remove special chars
              .replace(/\s+/g, '-') // Replace spaces with hyphens
              .replace(/-+/g, '-') // Replace multiple hyphens with single
              .trim();
            h2.id = `${sectionId}-${baseId}`;
          }

          const h2Link = document.createElement('a');
          h2Link.href = `#${h2.id}`;
          h2Link.textContent = h2.textContent;
          h2Link.classList.add('h2-link');
          sidebarNav.appendChild(h2Link);
        });
      }

      // Set first link as active
      const firstLink = sidebarNav.querySelector('a');
      if (firstLink) {
        firstLink.classList.add('active');
      }

      // Trigger MathJax to render LaTeX after markdown is inserted
      MathJax.typesetPromise([container]).then(() => {
        // Setup sidebar functionality after content is loaded
        if (window.setupSidebarLinks) window.setupSidebarLinks();
        if (window.setupSidebarHighlighting) window.setupSidebarHighlighting();
      });
    }

    loadNotes();
  </script>
</body>
</html>
